<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaSearch - Results</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-light bg-white border-bottom sticky-top py-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">MS</a>
            <div class="flex-grow-1 mx-4">
                <div class="input-group shadow-sm rounded-pill overflow-hidden border">
                    <input type="text" id="searchInput" class="form-control border-0 ps-3" placeholder="Search...">
                    <button class="btn btn-primary px-4" type="button" id="searchBtn">Search</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div id="wikiHero"></div>

                <div id="resultsList">
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
