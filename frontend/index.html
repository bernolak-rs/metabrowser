<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rust Metabrowser</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .result-card { transition: transform 0.2s; border: none; }
        .result-card:hover { transform: translateY(-3px); box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important; }
        .engine-badge { font-size: 0.75rem; vertical-align: middle; }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="text-center mb-4 fw-bold">Metabrowser</h1>
                
                <div class="input-group mb-5 shadow-sm rounded-pill overflow-hidden">
                    <input type="text" id="searchInput" class="form-control form-control-lg border-0 ps-4" placeholder="Search across engines...">
                    <button class="btn btn-primary px-4" type="button" id="searchBtn">
                        <span id="btnText">Search</span>
                        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                    </button>
                </div>

                <div id="resultsList">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const searchBtn = document.getElementById('searchBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const searchInput = document.getElementById('searchInput');
        const resultsList = document.getElementById('resultsList');

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            setLoading(true);
            resultsList.innerHTML = '';

            try {
                const response = await fetch(`/search/${encodeURIComponent(query)}`);
                
                if (!response.ok) throw new Error(`Server responded with ${response.status}`);
                
                const data = await response.json();
                renderResults(data);
            } catch (error) {
                resultsList.innerHTML = `
                    <div class="alert alert-danger shadow-sm" role="alert">
                        <strong>Error:</strong> ${error.message}. Is your backend running?
                    </div>`;
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            searchBtn.disabled = isLoading;
            if (isLoading) {
                btnText.classList.add('d-none');
                btnSpinner.classList.remove('d-none');
            } else {
                btnText.classList.remove('d-none');
                btnSpinner.classList.add('d-none');
            }
        }

        function renderResults(results) {
            if (results.length === 0) {
                resultsList.innerHTML = '<div class="text-center py-5 text-muted">No results found.</div>';
                return;
            }

            results.forEach(item => {
                let hostname = "Link";
                try { hostname = new URL(item.url).hostname.replace('www.', ''); } catch(e) {}

                const card = `
                    <div class="card mb-3 shadow-sm result-card">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <h5 class="card-title mb-1">
                                    <a href="${item.url}" target="_blank" class="text-decoration-none text-primary">
                                        ${item.title}
                                    </a>
                                </h5>
                                <span class="badge bg-secondary-subtle text-secondary engine-badge border">${hostname}</span>
                            </div>
                            <p class="card-text text-dark small mb-2">${item.snippet}</p>
                            <div class="text-truncate text-success x-small" style="font-size: 0.8rem;">
                                ${item.url}
                            </div>
                        </div>
                    </div>
                `;
                resultsList.insertAdjacentHTML('beforeend', card);
            });
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
