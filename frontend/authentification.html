<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MetaSearch - Login / Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-0 shadow-lg p-4 rounded-4">
                    <h2 id="authTitle" class="fw-bold text-center mb-4">Login</h2>
                    <form id="authForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username" class="form-control rounded-pill px-3" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control rounded-pill px-3" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Submit</button>
                    </form>
                    <div class="text-center mt-3">
                        <a href="#" id="toggleAuth" class="text-decoration-none small">Don't have an account? Register</a>
                    </div>
                    <div class="text-center mt-2">
                        <a href="index.html" class="text-muted small text-decoration-none">← Back to Search</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
