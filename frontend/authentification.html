<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MetaSearch - Login / Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/authentification.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card border-0 shadow-lg p-4 rounded-4" style="width: 100%; max-width: 400px;">
        
        <h2 id="authTitle" class="fw-bold text-center mb-4">Login</h2>
        
        <form id="authForm">
            <div class="mb-3">
                
                <div class="input-group custom-pill-group">
                    <input type="text" id="username" class="form-control border-0 ps-4" placeholder="Username" required>
                    <span class="input-group-text bg-white border-0 pe-4"><i class="bi bi-person"></i></span>
                </div>
            </div>

            <div class="mb-4">

                <div class="input-group custom-pill-group">
                    <input type="password" id="password" class="form-control border-0 ps-4" placeholder="Password" required>
                    <span class="input-group-text bg-white border-0 pe-4"><i class="bi bi-lock"></i></span>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Submit</button>
        </form>

        <div class="text-center mt-3">
            <a href="#" id="toggleAuth" class="text-decoration-none small">Don't have an account? Register</a>
            <br>
            <a href="index.html" class="text-muted small text-decoration-none mt-2 d-inline-block">← Back to Search</a>
        </div>
    </div>
    <script src="scripts/authentification.js"></script>
</body>
</html>
